<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Berenis MASSAMBA — Développeur Full-Stack</title>
    <meta
      name="description"
      content="Portfolio de Berenis MASSAMBA, développeur full-stack. Projets, compétences et parcours en développement web."
    />
    <meta name="theme-color" content="#0A0A0A" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/devicon/2.16.0/devicon.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="navbar" id="top">
      <div class="nav-pill">
        <a href="#top" class="logo">BM</a>

        <input type="checkbox" id="nav-check" class="nav-check" />

        <nav class="nav-links" aria-label="Navigation principale">
          <a href="#about">À propos</a>
          <a href="#skills">Compétences</a>
          <a href="#projects">Projets</a>
          <a href="#experience">Expérience</a>
          <a href="#blog">Blog</a>
          <a href="#contact">Contact</a>
        </nav>

        <input type="checkbox" id="theme-toggle" class="theme-check" />
        <label
          for="theme-toggle"
          class="theme-label"
          aria-label="Basculer entre le mode sombre et le mode clair"
        >
          <i class="fa-solid fa-moon icon-moon" aria-hidden="true"></i>
          <i class="fa-solid fa-sun icon-sun" aria-hidden="true"></i>
        </label>

        <label for="nav-check" class="nav-burger" aria-label="Ouvrir le menu">
          <i class="fa-solid fa-bars icon-open" aria-hidden="true"></i>
          <i class="fa-solid fa-xmark icon-close" aria-hidden="true"></i>
        </label>
      </div>
    </header>
  </body>
</html>
